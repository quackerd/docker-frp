kind: pipeline
type: docker
name: Docker image build

trigger:
  branch:
    - master

steps:
  - name: config
    image: alpine
    commands:
      - sh tag.sh
  - name: build
    image: thegeeklab/drone-docker-buildx
    privileged: true
    settings:
      platforms:
        - linux/arm64
        - linux/amd64
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      repo: quackerd/frp
