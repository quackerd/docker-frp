kind: pipeline
type: docker
name: Docker image build

trigger:
  branch:
    - master

steps:
  - name: config
    image: alpine
    commands:
      - sh tag.sh
  - name: build
    image: plugins/docker
    settings:
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      repo: quackerd/frp
