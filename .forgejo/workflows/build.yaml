name: Build and Publish

on:
  push:
    branches:
      - master
    paths-ignore:
      - "LICENSE"
      - "README.md"
      - "docker-compose.yml"

  schedule:
    # Every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"

  workflow_dispatch:

jobs:
  docker:
    container:
      image: docker:cli
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: runner/amd64
          - platform: linux/arm64
            runner: runner/earm64

      runs-on: ${{ matrix.runner }}
      env:
        - FRP_ARCH: ${{ matrix.platform }}

    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            nodejs \
            npm \
            git \
            bash \
            ca-certificates \
            curl \
            jq

      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Generate Tags
        run: chmod +x ./tag.sh && ./tag.sh && cat env >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and Publish
        uses: docker/bake-action@v7
        with:
          push: true
          no-cache: true
          pull: true
          targets: frp
          source: .
          set: |
            frp.platforms=${{ matrix.platform }}

      - name: Clean Up
        if: always() 
        run: docker system prune -af --volumes

