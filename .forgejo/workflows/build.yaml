name: Build and Publish

on:
  push:
    branches:
      - master
    paths-ignore:
      - "LICENSE"
      - "README.md"
      - "docker-compose.yml"

  schedule:
    # Every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"

  workflow_dispatch:

jobs:
  build:
    container:
      image: docker:cli
    runs-on: linux-earm64

    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            nodejs \
            npm \
            git \
            bash \
            ca-certificates \
            curl \
            jq

      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Generate Tags
        run: sh ./tag.sh

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and Publish
        uses: docker/bake-action@v7
        with:
          push: true
          no-cache: true
          pull: true
          targets: frp
          source: .
          files: ./docker-bake.hcl

      - name: Clean Up
        if: always()
        run: docker system prune -af --volumes